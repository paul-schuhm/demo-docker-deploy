#Compose file base

services:
  api:
    build:
      context: .
    environment:
      NODE_ENV: ${NODE_ENV}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - api-network
  db:
    image: mysql:9.6.0
    restart: always
    secrets:
      - mysql-root
    labels:
      - "autoheal=true"    
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql-root
    volumes:
      - ./init/:/docker-entrypoint-initdb.d/
      - ./db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db-data:
secrets:
  mysql-root:
    file: db/password.txt

networks:
  api-network:
    name: api-network
    driver: bridge