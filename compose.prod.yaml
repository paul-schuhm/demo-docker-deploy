services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-prod
    ports:
      - '${API_PORT:-3000}:3000' # API server
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${MEMORY_LIMIT:-2G}'
          cpus: '${CPU_LIMIT:-1.0}'
        reservations:
          memory: '${MEMORY_RESERVATION:-512M}'
          cpus: '${CPU_RESERVATION:-0.25}'
  db:
    restart: always
